name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python test dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Validate portability
        run: python scripts\validate_portability.py
      - name: Validate plugin manifest
        run: python scripts\validate_plugin.py .
      - name: Run tests
        shell: powershell
        run: |
          $env:PYTHONPATH = "$PWD\multi_aiweb_runtime\src"
          python -m pytest -q tests
      - name: Compile Python sources
        run: python -m compileall -q multi_aiweb_runtime tests
      - name: Installer dry run
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\install.ps1 -DryRun -SkipOracleDeps -SkipMarketplaceRegistration -SkipPluginInstall
