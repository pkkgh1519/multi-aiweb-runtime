# Fallback manual MCP block. Prefer installing this project as a Codex local marketplace plugin.
# Replace C:/Users/<YOUR_WINDOWS_USER> with your actual Windows profile path, or use the
# plugin-local .mcp.json generated by install.ps1.
# Do not paste secrets here. This local stdio server does not require tokens.
[mcp_servers.multi_aiweb_runtime]
command = "python"
args = ["C:/Users/<YOUR_WINDOWS_USER>/.codex/local-marketplaces/multi-aiweb-runtime/plugins/multi_aiweb_runtime_server.py"]
startup_timeout_sec = 10
tool_timeout_sec = 7200

# Optional state/plugin override. Leave unset to use the plugin-generated state path under the Codex home.
# Oracle backend state is stored under MULTI_AIWEB_RUNTIME_STATE_DIR/oracle/<oracle_target> by default.
# env = {
#   MULTI_AIWEB_RUNTIME_STATE_DIR = "C:/Users/<YOUR_WINDOWS_USER>/.codex/state/multi-aiweb-runtime",
#   MULTI_AIWEB_RUNTIME_PLUGIN_ROOT = "C:/Users/<YOUR_WINDOWS_USER>/.codex/local-marketplaces/multi-aiweb-runtime/plugins",
#   MULTI_AIWEB_RUNTIME_ORACLE_ENGINE_SOURCE = "bundled"
# }
